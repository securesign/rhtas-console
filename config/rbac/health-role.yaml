---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhtas-console-health-reader
  namespace: trusted-artifact-signer
rules:
- apiGroups: ["rhtas.redhat.com"]
  resources: ["securesigns", "rekors", "tufs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhtas-console-health-reader
  namespace: trusted-artifact-signer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhtas-console-health-reader
subjects:
- kind: ServiceAccount
  name: rhtas-console
  namespace: trusted-artifact-signer
