name: Database TLS Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-postgresql-tls:
    name: PostgreSQL with TLS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate TLS certificates
        run: |
          mkdir -p /tmp/postgres-certs
          cd /tmp/postgres-certs

          # Generate CA
          openssl genrsa -out ca.key 2048
          openssl req -new -x509 -days 365 -key ca.key -out ca.crt \
            -subj "/C=US/ST=Test/L=Test/O=Test/CN=Test CA"

          # Generate server certificate
          openssl genrsa -out server.key 2048
          openssl req -new -key server.key -out server.csr \
            -subj "/C=US/ST=Test/L=Test/O=Test/CN=localhost"
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -out server.crt -days 365

          # Set permissions
          chmod 600 server.key
          chmod 644 server.crt ca.crt

          # List generated files
          ls -la

      - name: Start PostgreSQL with TLS
        run: |
          # Start PostgreSQL container without TLS first
          docker run -d --name postgres-tls \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_USER=testuser \
            -e POSTGRES_DB=tuf_trust_test \
            -p 5432:5432 \
            postgres:16

          # Wait for PostgreSQL to initialize
          for i in {1..30}; do
            if docker exec postgres-tls pg_isready -U testuser; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          # Copy certificates into container
          docker exec postgres-tls mkdir -p /var/lib/postgresql/certs
          docker cp /tmp/postgres-certs/server.key postgres-tls:/var/lib/postgresql/certs/
          docker cp /tmp/postgres-certs/server.crt postgres-tls:/var/lib/postgresql/certs/
          docker cp /tmp/postgres-certs/ca.crt postgres-tls:/var/lib/postgresql/certs/

          # Fix ownership and permissions
          docker exec postgres-tls chown postgres:postgres \
            /var/lib/postgresql/certs/server.key \
            /var/lib/postgresql/certs/server.crt \
            /var/lib/postgresql/certs/ca.crt
          docker exec postgres-tls chmod 600 /var/lib/postgresql/certs/server.key

          # Configure PostgreSQL for TLS
          docker exec postgres-tls bash -c "cat >> /var/lib/postgresql/data/postgresql.conf << 'EOF'

          # TLS Configuration
          ssl = on
          ssl_cert_file = '/var/lib/postgresql/certs/server.crt'
          ssl_key_file = '/var/lib/postgresql/certs/server.key'
          ssl_ca_file = '/var/lib/postgresql/certs/ca.crt'
          EOF"

          # Restart PostgreSQL to apply TLS config
          docker stop postgres-tls
          docker start postgres-tls

          # Wait for PostgreSQL to be ready again
          sleep 3
          for i in {1..30}; do
            if docker exec postgres-tls pg_isready -U testuser; then
              echo "PostgreSQL is ready with TLS"
              break
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          # Verify SSL is enabled
          docker exec postgres-tls psql -U testuser -d tuf_trust_test -c "SHOW ssl;"

      - name: Build console
        run: |
          go build -v -o bin/rhtas_console ./cmd/rhtas_console

      - name: Test console with PostgreSQL TLS
        env:
          GODEBUG: fips140=off
        run: |
          # Start console in background
          ./bin/rhtas_console \
            --postgresql-uri="postgresql://testuser:testpass@localhost:5432/tuf_trust_test" \
            --db-tls-ca=/tmp/postgres-certs/ca.crt \
            --tuf-repo-url="https://tuf-repo-cdn.sigstore.dev" &
          CONSOLE_PID=$!

          # Wait for console to start
          sleep 10

          # Test health endpoint
          curl -f http://localhost:8080/healthz || exit 1

          # Test trust endpoint
          curl -f http://localhost:8080/api/v1/trust/targets || exit 1

          # Verify TLS connection in PostgreSQL
          docker exec postgres-tls psql -U testuser -d tuf_trust_test -c \
            "SELECT COUNT(*) FROM pg_stat_ssl WHERE ssl = true;" | grep -q "1"

          # Stop console
          kill $CONSOLE_PID
          wait $CONSOLE_PID || true

      - name: Run integration tests
        env:
          POSTGRES_DSN: "postgresql://testuser:testpass@localhost:5432/tuf_trust_test"
          GODEBUG: fips140=off
        run: |
          go test -v -race -timeout 5m ./internal/services -run "PostgreSQL"

      - name: Check database logs
        if: always()
        run: |
          docker logs postgres-tls

  test-mysql-tls:
    name: MySQL/MariaDB with TLS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate TLS certificates
        run: |
          mkdir -p /tmp/mysql-certs
          cd /tmp/mysql-certs

          # Generate CA
          openssl genrsa -out ca.key 2048
          openssl req -new -x509 -days 365 -key ca.key -out ca-cert.pem \
            -subj "/C=US/ST=Test/L=Test/O=Test/CN=Test CA"

          # Generate server certificate with SAN
          openssl genrsa -out server.key 2048
          openssl req -new -key server.key -out server.csr \
            -subj "/C=US/ST=Test/L=Test/O=Test/CN=localhost"

          # Create SAN extension file
          cat > server.ext << EOF
          subjectAltName = DNS:localhost,IP:127.0.0.1
          EOF

          # Sign with SAN
          openssl x509 -req -in server.csr -CA ca-cert.pem -CAkey ca.key \
            -CAcreateserial -out server-cert.pem -days 365 \
            -extfile server.ext

          # Set permissions
          chmod 644 *.pem server.key

          ls -la

      - name: Start MariaDB with TLS
        run: |
          # Start MariaDB without TLS first
          docker run -d --name mariadb-tls \
            -e MYSQL_ROOT_PASSWORD=testpass \
            -e MYSQL_DATABASE=tuf_trust_test \
            -p 3306:3306 \
            mariadb:10.11

          # Wait for MariaDB to initialize
          for i in {1..30}; do
            if docker exec mariadb-tls mysqladmin ping -h localhost -u root -ptestpass --silent; then
              echo "MariaDB is ready"
              break
            fi
            echo "Waiting for MariaDB..."
            sleep 2
          done

          # Copy certificates into container
          docker exec mariadb-tls mkdir -p /etc/mysql/certs
          docker cp /tmp/mysql-certs/ca-cert.pem mariadb-tls:/etc/mysql/certs/
          docker cp /tmp/mysql-certs/server-cert.pem mariadb-tls:/etc/mysql/certs/
          docker cp /tmp/mysql-certs/server.key mariadb-tls:/etc/mysql/certs/

          # Fix ownership and permissions
          docker exec mariadb-tls chown mysql:mysql \
            /etc/mysql/certs/ca-cert.pem \
            /etc/mysql/certs/server-cert.pem \
            /etc/mysql/certs/server.key
          docker exec mariadb-tls chmod 600 /etc/mysql/certs/server.key

          # Add TLS configuration to my.cnf
          docker exec mariadb-tls bash -c 'echo "" >> /etc/mysql/my.cnf'
          docker exec mariadb-tls bash -c 'echo "[mysqld]" >> /etc/mysql/my.cnf'
          docker exec mariadb-tls bash -c 'echo "ssl-ca=/etc/mysql/certs/ca-cert.pem" >> /etc/mysql/my.cnf'
          docker exec mariadb-tls bash -c 'echo "ssl-cert=/etc/mysql/certs/server-cert.pem" >> /etc/mysql/my.cnf'
          docker exec mariadb-tls bash -c 'echo "ssl-key=/etc/mysql/certs/server.key" >> /etc/mysql/my.cnf'

          # Restart MariaDB to apply TLS config
          docker stop mariadb-tls
          docker start mariadb-tls

          # Wait for MariaDB to be ready again
          sleep 3
          for i in {1..30}; do
            if docker exec mariadb-tls mysqladmin ping -h localhost -u root -ptestpass --silent; then
              echo "MariaDB restarted with TLS"
              break
            fi
            echo "Waiting for MariaDB..."
            sleep 2
          done

          # Verify SSL is enabled
          docker exec mariadb-tls mysql -u root -ptestpass \
            -e "SHOW VARIABLES LIKE 'have_ssl';"

      - name: Build console
        run: |
          go build -v -o bin/rhtas_console ./cmd/rhtas_console

      - name: Test console with MySQL TLS
        env:
          GODEBUG: fips140=off
        run: |
          # Start console in background
          ./bin/rhtas_console \
            --mysql-uri="root:testpass@tcp(localhost:3306)/tuf_trust_test?parseTime=true" \
            --db-tls-ca=/tmp/mysql-certs/ca-cert.pem \
            --tuf-repo-url="https://tuf-repo-cdn.sigstore.dev" &
          CONSOLE_PID=$!

          # Wait for console to start
          sleep 10

          # Test health endpoint
          curl -f http://localhost:8080/healthz || exit 1

          # Test trust endpoint
          curl -f http://localhost:8080/api/v1/trust/targets || exit 1

          # Verify TLS connection in MySQL
          docker exec mariadb-tls mysql -u root -ptestpass \
            -e "SHOW STATUS LIKE 'Ssl_cipher';" | grep -v "Ssl_cipher\s*$"

          # Stop console
          kill $CONSOLE_PID
          wait $CONSOLE_PID || true

      - name: Run integration tests
        env:
          MYSQL_DSN: "root:testpass@tcp(localhost:3306)/tuf_trust_test?parseTime=true"
          GODEBUG: fips140=off
        run: |
          go test -v -race -timeout 5m ./internal/services -run "MySQL"

      - name: Check database logs
        if: always()
        run: |
          docker logs mariadb-tls
